<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estaciones Meteoclimatic · Barcelona</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #1e2d3d;
            --navy2: #253546;
            --accent: #6fcfe0;
            --muted: #a8c4d8;
            --border: rgba(168,196,216,0.18);
            --text: #e8eef4;
            --color-text-primary: #1E293B;
            --color-text-secondary: #64748B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        .container { padding: 0; max-width: 100%; overflow-x: hidden; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
        }

        /* ══════ BANNER IDÉNTICO AL INDEX ══════ */
        .header-section {
            background: #2C3E50;
            padding: 0;
            background-image: url('banner.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            min-height: 300px;
        }
        @media (max-width: 480px) {
            .header-section { padding: 0; min-height: 150px; }
        }

        /* ══════ MENÚ NAVEGACIÓN ══════ */
        .nav-menu {
            background: var(--navy2);
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 100;
            flex-shrink: 0;
        }
        .nav-menu-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 20px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            background: var(--navy2);
            border: none;
            width: 100%;
            transition: background 0.2s;
        }
        .nav-menu-toggle:hover { background: var(--navy2); }
        .nav-menu-toggle span {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .nav-menu-arrow {
            font-size: 10px;
            color: var(--muted);
            transition: transform 0.3s ease;
        }
        .nav-menu-arrow.open { transform: rotate(180deg); }
        .nav-menu-hamburger {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-right: 4px;
        }
        .nav-menu-hamburger span {
            display: block;
            width: 16px;
            height: 2px;
            background: var(--muted);
            border-radius: 2px;
            letter-spacing: 0;
        }
        .nav-dropdown {
            display: none;
            flex-direction: column;
            background: var(--navy2);
            border-top: 1px solid rgba(168,196,216,0.15);
        }
        .nav-dropdown.open { display: flex; }
        .nav-dropdown a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 24px;
            text-decoration: none;
            border-bottom: 1px solid rgba(168,196,216,0.1);
            transition: background 0.2s;
        }
        .nav-dropdown a.active { background: var(--navy); }
        .nav-dropdown a:last-child { border-bottom: none; }
        .nav-dropdown a:hover { background: #2e4058; }
        .nav-dropdown-icon { font-size: 18px; flex-shrink: 0; }
        .nav-dropdown-text { display: flex; flex-direction: column; gap: 2px; }
        .nav-dropdown-title {
            font-size: 11px;
            font-weight: 700;
            color: #e2eaf0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .nav-dropdown-sub {
            font-size: 10px;
            color: #7a9bb5;
            letter-spacing: 0.3px;
        }
        /* ══════ FIN MENÚ ══════ */

        /* ══════ BARRA TÍTULO ══════ */
        .title-bar {
            background: var(--accent);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            border-bottom: 1px solid rgba(44,74,110,0.1);
            flex-shrink: 0;
        }
        .title-bar-icon { font-size: 18px; }
        .title-bar-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .title-bar-sub {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #2c4a6e;
        }
        .title-bar-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #1a3a5c;
        }


        /* Error */
        #err-panel {
            display: none;
            background: #0f1a24;
            border: 1px solid #ef444466;
            margin: 10px;
            border-radius: 8px;
            padding: 12px;
            font-size: 11px;
            color: #fca5a5;
            line-height: 1.7;
            flex-shrink: 0;
        }
        #err-panel strong { color: #f87171; display: block; margin-bottom: 4px; }

        /* ══════ LEYENDA ══════ */
        .legend {
            background: var(--navy2);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
        }
        .ll { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-right: 3px; }
        .li { display: flex; align-items: center; gap: 4px; }
        .ld { width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
        .lt { font-size: 9px; font-weight: 600; color: var(--muted); }

        /* ══════ LISTA ESTACIONES ══════ */
        .list-header {
            background: var(--navy2);
            border-top: 2px solid var(--accent);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .list-header-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }
        .list-count { font-size: 10px; color: var(--muted); }
        .list-wrap { background: var(--navy); flex-shrink: 0; }
        .est-row {
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 6px;
        }
        .est-row:last-child { border-bottom: none; }
        .est-nombre { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.2; }
        .est-id { font-size: 8px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-top: 1px; }
        .est-temp-col { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
        .est-temp { font-size: 22px; font-weight: 300; line-height: 1; color: #fff; }
        .est-mm { font-size: 9px; color: var(--muted); margin-top: 1px; }
        .est-mm span { color: #f97316; }
        .est-mm span.mn { color: #60a5fa; }
        .est-datos { grid-column: 1/-1; display: flex; gap: 12px; margin-top: 5px; flex-wrap: wrap; }
        .est-dato { display: flex; flex-direction: column; gap: 1px; }
        .est-dato-l { font-size: 7px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
        .est-dato-v { font-size: 12px; font-weight: 700; color: var(--text); }
        .list-empty { padding: 30px 16px; text-align: center; font-size: 11px; color: var(--muted); }

        /* ══════ TABLA RESUMEN DÍA ══════ */
        #resumen-dia {
            background: linear-gradient(135deg, #1a2d3e 0%, #1e3a50 100%);
            border-top: 2px solid var(--accent);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: none;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }
        #resumen-dia.visible { display: flex; }
        .resumen-title {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0;
        }
        .resumen-tabla-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .resumen-tabla-bloque {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .resumen-tabla-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-bottom: 1px solid var(--border);
        }
        .resumen-tabla-header-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .resumen-tabla-header.tmin .resumen-tabla-header-label { color: #60a5fa; }
        .resumen-tabla-header.tmax .resumen-tabla-header-label { color: #f97316; }
        .resumen-tabla-header.prec .resumen-tabla-header-label { color: #6fcfe0; }
        .resumen-fila {
            display: grid;
            grid-template-columns: 18px 1fr auto;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-bottom: 1px solid rgba(168,196,216,0.08);
        }
        .resumen-fila:last-child { border-bottom: none; }
        .resumen-fila-pos {
            font-size: 9px;
            font-weight: 700;
            color: var(--muted);
            opacity: 0.6;
            text-align: center;
        }
        .resumen-fila-pos.gold { color: #fbbf24; opacity: 1; }
        .resumen-fila-nombre {
            font-size: 11px;
            font-weight: 600;
            color: #cde0ef;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .resumen-fila-val {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }
        .resumen-fila-val span { font-size: 9px; font-weight: 400; color: var(--muted); }
        .tmin .resumen-fila-val { color: #60a5fa; }
        .tmax .resumen-fila-val { color: #f97316; }
        .prec .resumen-fila-val { color: #6fcfe0; }

        /* ══════ FOOTER ══════ */
        .page-footer {
            background: var(--navy2);
            border-top: 1px solid var(--border);
            padding: 14px 20px;
            text-align: center;
            flex-shrink: 0;
            margin-top: auto;
        }
        .page-footer a {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
        }
        .page-footer a:hover { color: var(--accent); }

    </style>
</head>
<body>
<div class="container">

    <!-- BANNER IDÉNTICO AL INDEX -->
    <div class="header-section"></div>

    <!-- MENÚ DESPLEGABLE IDÉNTICO AL INDEX -->
    <nav class="nav-menu">
        <button class="nav-menu-toggle" onclick="toggleNavMenu()" id="nav-toggle">
            <div class="nav-menu-hamburger">
            </div>
            <span>Menú</span>
            <span class="nav-menu-arrow" id="nav-arrow">▼</span>
        </button>
        <div class="nav-dropdown" id="nav-dropdown">
            <a href="index.html">
                <div class="nav-dropdown-text">
                    <span class="nav-dropdown-title">Inicio</span>
                </div>
            </a>
            <a href="divulgacion.html">
                <div class="nav-dropdown-text">
                    <span class="nav-dropdown-title">Divulgación, clima y datos curiosos</span>
                </div>
            </a>
            <a href="mapa.html" class="active">
                <div class="nav-dropdown-text">
                    <span class="nav-dropdown-title">Estaciones automáticas en tiempo real</span>
                </div>
            </a>
        </div>
    </nav>
    <script>
    function toggleNavMenu() {
        var dd = document.getElementById('nav-dropdown');
        var arrow = document.getElementById('nav-arrow');
        dd.classList.toggle('open');
        arrow.classList.toggle('open');
    }
    </script>

    <!-- BARRA TÍTULO -->
    <div class="title-bar">
        <div class="title-bar-text">
            <span class="title-bar-sub">Datos en tiempo real · Barcelona</span>
            <span class="title-bar-name">Estaciones Meteoclimatic</span>
        </div>
    </div>

    <!-- TABLA RESUMEN DEL DÍA -->
    <div id="resumen-dia">
        <div class="resumen-title">Resumen del día · Barcelona</div>
        <div class="resumen-tabla-wrap">
            <!-- Mínimas -->
            <div class="resumen-tabla-bloque">
                <div class="resumen-tabla-header tmin">
                    <span class="resumen-tabla-header-label">Mínimas del día</span>
                </div>
                <div id="res-tmin-rows"></div>
            </div>
            <!-- Máximas -->
            <div class="resumen-tabla-bloque">
                <div class="resumen-tabla-header tmax">
                    <span class="resumen-tabla-header-label">Máximas del día</span>
                </div>
                <div id="res-tmax-rows"></div>
            </div>
            <!-- Precipitación -->
            <div class="resumen-tabla-bloque">
                <div class="resumen-tabla-header prec">
                    <span class="resumen-tabla-header-label">Lluvia máxima acumulada</span>
                </div>
                <div id="res-prec-rows"></div>
            </div>
        </div>
    </div>

    <!-- ERROR -->
    <div id="err-panel"></div>

    <!-- LISTA ESTACIONES -->
    <div class="list-header">
        <span class="list-header-title">Estaciones · A–Z</span>
        <span class="list-count" id="list-count"></span>
    </div>
    <div class="list-wrap" id="est-list">
        <div class="list-empty">Cargando estaciones…</div>
    </div>

    <!-- FOOTER -->
    <div class="page-footer">
        <a href="https://www.meteoclimatic.net" target="_blank" rel="noopener">Datos: Meteoclimatic.net</a>
    </div>

<script>
const WORKER = 'https://proxy-meteoclimatic.lojasergi.workers.dev';
const BCN = { latMin:41.32, latMax:41.47, lngMin:2.05, lngMax:2.23 };

function tempColor(t) {
    if (t===null||isNaN(t)) return '#8fa3b8';
    if (t<10) return '#60a5fa'; if (t<20) return '#34d399';
    if (t<28) return '#fbbf24'; if (t<35) return '#f97316';
    return '#ef4444';
}
function azimDir(d) {
    if (d===null||d===undefined||isNaN(d)) return '';
    return ' '+['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'][Math.round(d/22.5)%16];
}
function f(v, dec=1) { return (v!==null&&v!==undefined&&!isNaN(v)) ? Number(v).toFixed(dec) : '—'; }
function num(s) { return parseFloat(String(s).replace(',','.')); }

const EXCLUIR = new Set([
    'ESCAT0800000008080A','ESCAT0800000008913B','ESCAT0800000008940C',
    'ESCAT0800000008820D','ESCAT0800000008901D','ESCAT0800000008198A',
    'ESCAT0800000008980A','ESCAT0800000008980C'
]);

function parseRSS(txt) {
    const estaciones = [];
    const items = txt.split('<item>');
    items.shift();
    for (const item of items) {
        try {
            const latM = item.match(/<geo:lat>([\d.]+)<\/geo:lat>/);
            const lngM = item.match(/<geo:long>([\d.]+)<\/geo:long>/);
            if (!latM || !lngM) continue;
            const lat = parseFloat(latM[1]);
            const lng = parseFloat(lngM[1]);
            if (isNaN(lat) || isNaN(lng)) continue;
            if (lat < BCN.latMin || lat > BCN.latMax || lng < BCN.lngMin || lng > BCN.lngMax) continue;
            const linkM = item.match(/perfil\/(ESCAT[A-Z0-9]+)/i);
            const id = linkM ? linkM[1].toUpperCase() : '';
            const dataM = item.match(/\[\[<(ESCAT[^;>]+;[^>]+)>\]\]/);
            if (!dataM) continue;
            const raw = dataM[1].trim();
            const grupos = [];
            const reG = /\(([^)]+)\)/g;
            let g;
            while ((g = reG.exec(raw)) !== null) {
                grupos.push(g[1].split(';').map(num));
            }
            if (grupos.length < 4) continue;
            const CORRECCIONES_RAW = {"can bruixa":"Les Corts (Can Bruixa)","torguineu navas":"Navas","beteve":"Poblenou (Betevé)","casa l'aigua":"Trinitat Vella (Casa l'Aigua)","rectoret":"Les Planes (Rectoret)"};
            function normalizar(s) { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
            let nombre = raw.substring(raw.lastIndexOf(')') + 2).trim().replace(/^Barcelona\s*[-\u2013]\s*/i, '').replace(/^Barcelona\s+/i, '');
            const nombreNorm = normalizar(nombre);
            const corr = Object.entries(CORRECCIONES_RAW).find(([k]) => normalizar(k) === nombreNorm);
            if (corr) { if (!corr[1]) continue; nombre = corr[1]; }
            if (EXCLUIR.has(id)) continue;
            estaciones.push({
                id, lat, lng, nombre,
                temp:   grupos[0]?.[0] ?? null,
                tmax:   grupos[0]?.[1] ?? null,
                tmin:   grupos[0]?.[2] ?? null,
                hum:    grupos[1]?.[0] ?? null,
                baro:   grupos[2]?.[0] ?? null,
                viento: grupos[3]?.[0] ?? null,
                azim:   grupos[3]?.[2] ?? null,
                prec:   grupos[4]?.[0] ?? null,
            });
        } catch(e) {}
    }
    return estaciones;
}

function actualizarResumen(estaciones) {
    const tminList = [], tmaxList = [], precList = [];

    for (const e of estaciones) {
        const tmin = (e.tmin !== null && !isNaN(e.tmin)) ? Number(e.tmin) : null;
        const tmax = (e.tmax !== null && !isNaN(e.tmax)) ? Number(e.tmax) : null;
        const prec = (e.prec !== null && !isNaN(e.prec)) ? Number(e.prec) : null;
        if (tmin !== null) tminList.push({ val: tmin, nombre: e.nombre });
        if (tmax !== null) tmaxList.push({ val: tmax, nombre: e.nombre });
        if (prec !== null) precList.push({ val: prec, nombre: e.nombre });
    }

    if (!tminList.length && !tmaxList.length) return;
    document.getElementById('resumen-dia').classList.add('visible');

    tminList.sort((a,b) => a.val - b.val);
    tmaxList.sort((a,b) => b.val - a.val);
    precList.sort((a,b) => b.val - a.val);

    const MEDALS = ['','',''];

    function renderRows(containerId, list, unit, cssClass) {
        const wrap = document.getElementById(containerId);
        const top3 = list.slice(0, 3);
        wrap.innerHTML = top3.map((item, i) => `
            <div class="resumen-fila ${cssClass}">
                <div class="resumen-fila-pos${i===0?' gold':''}">${MEDALS[i]}</div>
                <div class="resumen-fila-nombre">${item.nombre}</div>
                <div class="resumen-fila-val">${item.val.toFixed(1)}<span>${unit}</span></div>
            </div>`).join('');
    }

    renderRows('res-tmin-rows', tminList, ' °C', 'tmin');
    renderRows('res-tmax-rows', tmaxList, ' °C', 'tmax');
    renderRows('res-prec-rows', precList, ' mm', 'prec');
}

function corregirNombre(n) {
    if (n.includes('betev')) return 'Poblenou (Betevé)';
    if (n.includes('Torguineu') || n.includes('torguineu')) return 'Navas';
    if (n.includes('Can Bruixa') || n.includes('can bruixa')) return 'Les Corts (Can Bruixa)';
    if (n.includes('Aigua') || n.includes('aigua')) return "Trinitat Vella (Casa l'Aigua)";
    return n;
}

function renderList(estaciones) {
    const wrap = document.getElementById('est-list');
    const cnt  = document.getElementById('list-count');
    estaciones.forEach(e => { e.nombre = corregirNombre(e.nombre); });
    const sorted = [...estaciones].sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
    cnt.textContent = sorted.length + ' estaciones';
    if (!sorted.length) { wrap.innerHTML = '<div class="list-empty">Sin estaciones en el área</div>'; return; }
    wrap.innerHTML = sorted.map(e => {
        return `<div class="est-row">
            <div>
                <div class="est-nombre">${e.nombre}</div>
            </div>
            <div class="est-temp-col">
                <span class="est-temp">${f(e.temp)}°</span>
                <span class="est-mm"><span>▲${f(e.tmax)}°</span> <span class="mn">▼${f(e.tmin)}°</span></span>
            </div>
            <div class="est-datos">
                <div class="est-dato"><span class="est-dato-l">Humedad</span><span class="est-dato-v">${f(e.hum,0)} %</span></div>
                <div class="est-dato"><span class="est-dato-l">Presión</span><span class="est-dato-v">${f(e.baro)} hPa</span></div>
                <div class="est-dato"><span class="est-dato-l">Viento</span><span class="est-dato-v">${f(e.viento,0)} km/h${azimDir(e.azim)}</span></div>
                <div class="est-dato"><span class="est-dato-l">Lluvia hoy</span><span class="est-dato-v" style="color:#60a5fa">${f(e.prec)} mm</span></div>
            </div>
        </div>`;
    }).join('');
}

async function cargarDatos() {
    const err = document.getElementById('err-panel');
    try {
        const r = await fetch(WORKER, { signal: AbortSignal.timeout(15000) });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const xml = await r.text();
        if (!xml || xml.includes('QUERY ERROR') || xml.length < 200) throw new Error('Respuesta inválida');
        const estaciones = parseRSS(xml);
        err.style.display = 'none';
        renderList(estaciones);
        actualizarResumen(estaciones);
    } catch(e) {
        err.style.display = 'block';
        err.innerHTML = `<strong>⚠ Error</strong>${e.message}`;
    }
}

cargarDatos();
setInterval(cargarDatos, 10 * 60 * 1000);
</script>
</div>
</body>
</html>
