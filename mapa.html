<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estaciones Meteoclimatic · Barcelona</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        :root {
            --navy:    #1a2533;
            --navy2:   #243040;
            --accent:  #6fcfe0;
            --accent2: #3fa8be;
            --warm:    #f0a500;
            --cold:    #5ab4e8;
            --text:    #e8eef4;
            --muted:   #8fa3b8;
            --card-bg: rgba(26,37,51,0.97);
            --border:  rgba(111,207,224,0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--navy);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .header {
            background: #2C3E50;
            padding: 0;
            background-image: url('banner.png');
            background-size: cover;
            background-position: center;
            min-height: 140px;
            position: relative;
            flex-shrink: 0;
        }
        .header-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(26,37,51,0.35) 0%, rgba(26,37,51,0.75) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px 18px;
        }
        .header-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-align: center;
            line-height: 1.1;
        }
        .header-sub {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-top: 4px;
            text-align: center;
        }
        .back-link {
            position: absolute;
            top: 14px;
            left: 14px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            background: rgba(26,37,51,0.55);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 5px 10px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            z-index: 10;
        }
        .back-link:hover { background: rgba(111,207,224,0.25); color: #fff; }

        /* ── STATUS BAR ── */
        .status-bar {
            background: var(--navy2);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        .status-dot.loading { background: var(--warm); }
        .status-dot.error   { background: #ef4444; animation: none; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .status-text {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .station-count {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        /* ── MAP ── */
        #map {
            flex: 1;
            min-height: 420px;
            width: 100%;
        }

        /* ── LEAFLET POPUP CUSTOM ── */
        .leaflet-popup-content-wrapper {
            background: var(--card-bg) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.55) !important;
            padding: 0 !important;
            overflow: hidden;
        }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-content { margin: 0 !important; width: auto !important; }
        .leaflet-popup-close-button {
            color: var(--muted) !important;
            font-size: 18px !important;
            top: 8px !important;
            right: 10px !important;
            z-index: 10;
        }
        .leaflet-popup-close-button:hover { color: var(--accent) !important; }

        /* ── POPUP CONTENT ── */
        .popup-wrap {
            width: 240px;
            font-family: 'Barlow', sans-serif;
        }
        .popup-header {
            background: linear-gradient(135deg, var(--navy2) 0%, #1e3048 100%);
            border-bottom: 1px solid var(--border);
            padding: 12px 14px 10px;
        }
        .popup-station-id {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 3px;
        }
        .popup-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
            line-height: 1.2;
            padding-right: 18px;
        }
        .popup-body {
            padding: 12px 14px;
        }
        .popup-temp-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 12px;
        }
        .popup-temp-main {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 42px;
            font-weight: 800;
            line-height: 1;
            color: #fff;
        }
        .popup-temp-unit {
            font-size: 16px;
            font-weight: 400;
            color: var(--muted);
        }
        .popup-temp-minmax {
            display: flex;
            flex-direction: column;
            gap: 1px;
            margin-left: 4px;
        }
        .popup-tmax {
            font-size: 12px;
            font-weight: 700;
            color: #f97316;
        }
        .popup-tmin {
            font-size: 12px;
            font-weight: 700;
            color: #60a5fa;
        }
        .popup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .popup-datum {
            background: rgba(111,207,224,0.07);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 8px;
        }
        .popup-datum-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 3px;
        }
        .popup-datum-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }
        .popup-rain-value { color: #60a5fa; }
        .popup-footer {
            border-top: 1px solid var(--border);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .popup-updated {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.5px;
        }
        .popup-link {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 3px 8px;
            transition: all 0.2s;
        }
        .popup-link:hover {
            background: var(--accent);
            color: var(--navy);
        }
        .popup-no-data {
            padding: 16px 14px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }

        /* ── MARKER CUSTOM ── */
        .mc-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .mc-marker-bubble {
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 3px 10px rgba(0,0,0,0.45);
            transition: transform 0.15s;
        }
        .mc-marker-bubble:hover { transform: rotate(-45deg) scale(1.12); }
        .mc-marker-temp {
            transform: rotate(45deg);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            line-height: 1;
        }
        .mc-marker-dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        /* ── LEGEND ── */
        .legend {
            background: var(--navy2);
            border-top: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
        }
        .legend-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-right: 4px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .legend-text {
            font-size: 9px;
            font-weight: 600;
            color: var(--muted);
        }

        /* ── FOOTER ── */
        .footer {
            background: var(--navy2);
            border-top: 1px solid var(--border);
            padding: 10px 16px;
            text-align: center;
            flex-shrink: 0;
        }
        .footer a {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
        }
        .footer a:hover { color: var(--accent); }

        /* ── LEAFLET OVERRIDE ── */
        .leaflet-control-zoom a {
            background: var(--navy2) !important;
            color: var(--accent) !important;
            border-color: var(--border) !important;
        }
        .leaflet-control-zoom a:hover {
            background: var(--accent) !important;
            color: var(--navy) !important;
        }
        .leaflet-control-attribution {
            background: rgba(26,37,51,0.85) !important;
            color: var(--muted) !important;
            font-size: 9px !important;
        }
        .leaflet-control-attribution a { color: var(--accent) !important; }

        /* ── LOADING OVERLAY ── */
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(26,37,51,0.82);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        #loading-overlay.hidden { opacity: 0; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }

        #map-wrap { position: relative; flex: 1; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <a class="back-link" href="index.html">← Volver</a>
        <div class="header-overlay">
            <div class="header-title">Estaciones Meteoclimatic</div>
            <div class="header-sub">Barcelona · Datos en tiempo real</div>
        </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <div class="status-left">
            <div class="status-dot loading" id="status-dot"></div>
            <span class="status-text" id="status-text">Cargando datos…</span>
        </div>
        <span class="station-count" id="station-count"></span>
    </div>

    <!-- MAP -->
    <div id="map-wrap">
        <div id="map"></div>
        <div id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text">Cargando estaciones</div>
        </div>
    </div>

    <!-- LEYENDA -->
    <div class="legend">
        <span class="legend-label">Temperatura</span>
        <div class="legend-item">
            <div class="legend-dot" style="background:#60a5fa;"></div>
            <span class="legend-text">&lt;10°</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#34d399;"></div>
            <span class="legend-text">10–20°</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#fbbf24;"></div>
            <span class="legend-text">20–28°</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#f97316;"></div>
            <span class="legend-text">28–35°</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#ef4444;"></div>
            <span class="legend-text">&gt;35°</span>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <a href="https://www.meteoclimatic.net" target="_blank" rel="noopener">Datos: Meteoclimatic.net</a>
    </div>

<script>
// ═══════════════════════════════════════════════
//  ESTACIONES BARCELONA CIUDAD — coordenadas fijas
//  Códigos Meteoclimatic verificados
// ═══════════════════════════════════════════════
const ESTACIONES = [
    { id: 'ESCAT0800000008015A', nombre: 'Eixample',          lat: 41.3879, lng: 2.1699 },
    { id: 'ESCAT0800000008023I', nombre: 'Sant Gervasi',      lat: 41.4061, lng: 2.1381 },
    { id: 'ESCAT0800000008018A', nombre: 'El Clot',           lat: 41.4082, lng: 2.1914 },
    { id: 'ESCAT0800000008014F', nombre: 'Plaça Sants',       lat: 41.3789, lng: 2.1414 },
    { id: 'ESCAT0800000008032A', nombre: 'Horta',             lat: 41.4316, lng: 2.1655 },
    { id: 'ESCAT0800000008226A', nombre: 'Terrassa (ref)',    lat: 41.5614, lng: 2.0089 },
    { id: 'ESCAT0800000008017A', nombre: 'Gràcia',            lat: 41.4027, lng: 2.1541 },
    { id: 'ESCAT0800000008026A', nombre: 'Nou Barris',        lat: 41.4378, lng: 2.1786 },
    { id: 'ESCAT0800000008020A', nombre: 'Poble Nou',         lat: 41.4008, lng: 2.2011 },
    { id: 'ESCAT0800000008025A', nombre: 'Sant Andreu',       lat: 41.4319, lng: 2.1892 },
    { id: 'ESCAT0800000008016A', nombre: 'Les Corts',         lat: 41.3844, lng: 2.1319 },
    { id: 'ESCAT0800000008022A', nombre: 'Sarrià',            lat: 41.3997, lng: 2.1219 },
    { id: 'ESCAT0800000008019A', nombre: 'Sant Martí',        lat: 41.4128, lng: 2.2097 },
    { id: 'ESCAT0800000008021A', nombre: 'Pedralbes',         lat: 41.3889, lng: 2.1128 },
    { id: 'ESCAT0800000008024A', nombre: 'Vallvidrera',       lat: 41.4131, lng: 2.1022 },
];

// ═══════════════════════════════════════════════
//  INICIALIZAR MAPA LEAFLET
// ═══════════════════════════════════════════════
const map = L.map('map', {
    center: [41.3983, 2.1620],
    zoom: 13,
    zoomControl: true,
    attributionControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains: 'abcd',
    maxZoom: 19,
}).addTo(map);

// ═══════════════════════════════════════════════
//  COLOR SEGÚN TEMPERATURA
// ═══════════════════════════════════════════════
function tempColor(t) {
    if (t === null || isNaN(t)) return '#8fa3b8';
    if (t < 10)  return '#60a5fa';
    if (t < 20)  return '#34d399';
    if (t < 28)  return '#fbbf24';
    if (t < 35)  return '#f97316';
    return '#ef4444';
}

// ═══════════════════════════════════════════════
//  CREAR MARCADOR PERSONALIZADO
// ═══════════════════════════════════════════════
function crearIcono(temp) {
    const color = tempColor(temp);
    const label = temp !== null && !isNaN(temp) ? Math.round(temp) + '°' : '—';
    const html = `
        <div class="mc-marker">
            <div class="mc-marker-bubble" style="background:${color};">
                <span class="mc-marker-temp">${label}</span>
            </div>
            <div class="mc-marker-dot"></div>
        </div>`;
    return L.divIcon({
        html,
        className: '',
        iconSize:   [36, 46],
        iconAnchor: [18, 46],
        popupAnchor:[0, -48],
    });
}

// ═══════════════════════════════════════════════
//  PARSEAR RSS DE METEOCLIMATIC
//  Formato: [[<CODIGO;(T;Tmax;Tmin);(H;Hmax;Hmin);(B;Bmax;Bmin);(W;Wmax;Azim);(P);Nombre>]]
// ═══════════════════════════════════════════════
function parseRSS(xmlText) {
    const mapa = {};
    // Buscar todos los bloques [[<...>]]
    const regex = /\[\[<([^>]+)>\]\]/g;
    let m;
    while ((m = regex.exec(xmlText)) !== null) {
        const raw = m[1];
        // Separar por ; pero respetando los paréntesis
        // Formato: ID;(T;Tmax;Tmin);(H;Hmax;Hmin);(B;Bmax;Bmin);(W;Wmax;Azim);(P);Nombre
        const partes = raw.split(';(');
        if (partes.length < 6) continue;

        const id = partes[0].trim().toUpperCase();

        const parseGrupo = (str) => {
            const s = str.replace(/[()]/g, '');
            return s.split(';').map(v => {
                const n = parseFloat(v.replace(',', '.'));
                return isNaN(n) ? null : n;
            });
        };

        const temp    = parseGrupo(partes[1]); // T, Tmax, Tmin
        const hum     = parseGrupo(partes[2]); // H, Hmax, Hmin
        const baro    = parseGrupo(partes[3]); // B, Bmax, Bmin
        const viento  = parseGrupo(partes[4]); // W, Wmax, Azim
        // precipitación: puede ser "(P)" o "P)" dependiendo del split
        const precRaw = partes[5] ? partes[5].replace(/[()]/g,'').split(';')[0] : null;
        const prec    = precRaw ? parseFloat(precRaw.replace(',','.')) : null;

        mapa[id] = {
            temp:  temp[0], tmax: temp[1], tmin: temp[2],
            hum:   hum[0],  hmax: hum[1],  hmin: hum[2],
            baro:  baro[0],
            viento: viento[0], rafaga: viento[1], azim: viento[2],
            prec:  isNaN(prec) ? null : prec,
        };
    }
    return mapa;
}

// ═══════════════════════════════════════════════
//  DIRECCIÓN VIENTO
// ═══════════════════════════════════════════════
function azimToDir(deg) {
    if (deg === null) return '—';
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
    return dirs[Math.round(deg / 22.5) % 16];
}

// ═══════════════════════════════════════════════
//  GENERAR POPUP HTML
// ═══════════════════════════════════════════════
function popupHTML(est, datos) {
    if (!datos) {
        return `<div class="popup-wrap">
            <div class="popup-header">
                <div class="popup-station-id">${est.id}</div>
                <div class="popup-name">${est.nombre}</div>
            </div>
            <div class="popup-no-data">Sin datos disponibles en este momento</div>
            <div class="popup-footer">
                <span class="popup-updated">—</span>
                <a class="popup-link" href="https://www.meteoclimatic.net/perfil/${est.id}" target="_blank">Ver estación</a>
            </div>
        </div>`;
    }

    const fmt = v => (v !== null && !isNaN(v)) ? v.toFixed(1) : '—';
    const fmtI = v => (v !== null && !isNaN(v)) ? Math.round(v) : '—';

    return `<div class="popup-wrap">
        <div class="popup-header">
            <div class="popup-station-id">${est.id}</div>
            <div class="popup-name">${est.nombre}</div>
        </div>
        <div class="popup-body">
            <div class="popup-temp-row">
                <span class="popup-temp-main">${fmt(datos.temp)}</span>
                <span class="popup-temp-unit">°C</span>
                <div class="popup-temp-minmax">
                    <span class="popup-tmax">▲ ${fmt(datos.tmax)}°</span>
                    <span class="popup-tmin">▼ ${fmt(datos.tmin)}°</span>
                </div>
            </div>
            <div class="popup-grid">
                <div class="popup-datum">
                    <div class="popup-datum-label">Humedad</div>
                    <div class="popup-datum-value">${fmtI(datos.hum)} <span style="font-size:11px;font-weight:400;color:var(--muted)">%</span></div>
                </div>
                <div class="popup-datum">
                    <div class="popup-datum-label">Presión</div>
                    <div class="popup-datum-value" style="font-size:13px;">${fmt(datos.baro)} <span style="font-size:10px;font-weight:400;color:var(--muted)">hPa</span></div>
                </div>
                <div class="popup-datum">
                    <div class="popup-datum-label">Viento</div>
                    <div class="popup-datum-value">${fmtI(datos.viento)} <span style="font-size:11px;font-weight:400;color:var(--muted)">km/h ${azimToDir(datos.azim)}</span></div>
                </div>
                <div class="popup-datum">
                    <div class="popup-datum-label">Lluvia hoy</div>
                    <div class="popup-datum-value popup-rain-value">${fmt(datos.prec)} <span style="font-size:11px;font-weight:400;color:var(--muted)">mm</span></div>
                </div>
            </div>
        </div>
        <div class="popup-footer">
            <span class="popup-updated">Meteoclimatic · Tiempo real</span>
            <a class="popup-link" href="https://www.meteoclimatic.net/perfil/${est.id.toLowerCase()}" target="_blank" rel="noopener">Ver más</a>
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════
//  CARGAR DATOS Y PINTAR MARCADORES
// ═══════════════════════════════════════════════
const marcadores = {};

async function cargarDatos() {
    const dot  = document.getElementById('status-dot');
    const txt  = document.getElementById('status-text');
    const cnt  = document.getElementById('station-count');
    const overlay = document.getElementById('loading-overlay');

    dot.className = 'status-dot loading';
    txt.textContent = 'Actualizando datos…';

    // Usamos un proxy CORS público para el RSS de Meteoclimatic provincia Barcelona
    const RSS_URL = 'https://www.meteoclimatic.net/feed/RSS/ESCAT08';
    const PROXY   = 'https://corsproxy.io/?' + encodeURIComponent(RSS_URL);

    let datosMap = {};
    try {
        const resp = await fetch(PROXY);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const xml = await resp.text();
        datosMap = parseRSS(xml);
        console.log('[Meteoclimatic] Estaciones parseadas:', Object.keys(datosMap).length);
    } catch (err) {
        console.warn('[Meteoclimatic] Error cargando RSS:', err);
        dot.className = 'status-dot error';
        txt.textContent = 'Error al cargar datos';
    }

    // Pintar / actualizar marcadores
    let activas = 0;
    ESTACIONES.forEach(est => {
        const datos = datosMap[est.id] || null;
        if (datos) activas++;

        const icono = crearIcono(datos ? datos.temp : null);
        const popup = L.popup({ maxWidth: 260, minWidth: 240, closeButton: true })
                       .setContent(popupHTML(est, datos));

        if (marcadores[est.id]) {
            // Actualizar marcador existente
            marcadores[est.id].setIcon(icono);
            marcadores[est.id].setPopupContent(popupHTML(est, datos));
        } else {
            // Crear nuevo marcador
            const marker = L.marker([est.lat, est.lng], { icon: icono })
                            .bindPopup(popup)
                            .addTo(map);
            marcadores[est.id] = marker;
        }
    });

    // Actualizar status bar
    if (Object.keys(datosMap).length > 0) {
        dot.className = 'status-dot';
        txt.textContent = 'Datos actualizados · ' + new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        cnt.textContent = activas + ' estaciones con datos';
    }

    // Ocultar overlay de carga
    overlay.classList.add('hidden');
    setTimeout(() => { overlay.style.display = 'none'; }, 400);
}

// Carga inicial
cargarDatos();

// Actualización automática cada 10 minutos
setInterval(cargarDatos, 10 * 60 * 1000);
</script>
