<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Artículo Meteorológico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-box {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 100%; max-width: 360px; text-align: center;
    }
    .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; font-size: 15px; font-family: inherit;
      outline: none; transition: border-color .2s;
      margin-bottom: 14px;
    }
    .login-box input:focus { border-color: #2c3e50; }
    .btn-primary {
      width: 100%; padding: 13px; background: #2c3e50; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background .2s;
    }
    .btn-primary:hover { background: #1a2a38; }
    .login-error {
      color: #ef4444; font-size: 13px; margin-top: 10px;
      display: none;
    }

    /* ── EDITOR ── */
    #editor-screen { display: none; max-width: 680px; margin: 0 auto; padding: 32px 20px 60px; }
    .editor-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .editor-header h1 { font-size: 20px; font-weight: 700; }
    .badge-live {
      display: flex; align-items: center; gap: 6px;
      background: #ecfdf5; color: #059669;
      border: 1px solid #a7f3d0; border-radius: 20px;
      padding: 5px 12px; font-size: 12px; font-weight: 600;
    }
    .badge-live::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 24px; margin-bottom: 20px;
    }
    .card label {
      display: block; font-size: 11px; font-weight: 700;
      color: #64748b; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .card input[type="text"],
    .card textarea {
      width: 100%; border: 1.5px solid #e2e8f0;
      border-radius: 10px; padding: 12px 14px;
      font-size: 14px; font-family: inherit; color: #1e293b;
      outline: none; resize: vertical; transition: border-color .2s;
    }
    .card input:focus, .card textarea:focus { border-color: #2c3e50; }
    .card textarea { min-height: 180px; line-height: 1.7; }

    .bloque-extra {
      background: #f8fafc; border: 1.5px dashed #cbd5e1;
      border-radius: 10px; padding: 16px; margin-top: 12px;
    }
    .bloque-extra label { margin-top: 10px; }
    .bloque-extra input { margin-bottom: 8px; }

    .btn-add-bloque {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px; background: #f1f5f9; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 13px; font-weight: 600; color: #475569;
      cursor: pointer; font-family: inherit; transition: all .2s;
      margin-top: 12px;
    }
    .btn-add-bloque:hover { background: #e2e8f0; }
    .btn-remove { float: right; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 18px; line-height: 1; padding: 0; }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-save {
      flex: 1; padding: 14px; background: #2c3e50; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: background .2s;
      min-width: 180px;
    }
    .btn-save:hover { background: #1a2a38; }
    .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-logout {
      padding: 14px 20px; background: #fff; color: #64748b;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .2s;
    }
    .btn-logout:hover { background: #f1f5f9; }

    .status-msg {
      text-align: center; font-size: 13px; margin-top: 14px;
      height: 20px; font-weight: 500;
    }
    .status-ok { color: #10b981; }
    .status-err { color: #ef4444; }
    .status-loading { color: #94a3b8; }

    /* ── PREVIEW ── */
    .preview-card { border: 2px solid #e2e8f0; }
    .preview-label {
      font-size: 10px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 16px;
    }
    #preview-content { font-size: 13px; color: #334155; line-height: 1.75; }
    #preview-content .p-fecha { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    #preview-content .p-titular { font-size: 14px; font-weight: 700; color: #1a3a5c; margin-bottom: 8px; line-height: 1.4; }
    #preview-content .p-subtitulo { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
    #preview-content .p-cuerpo { white-space: pre-wrap; }
    #preview-content .p-imagen { width: 100%; border-radius: 6px; margin: 8px 0; display: block; }
    #preview-content .p-separador { border: none; border-top: 1px solid #e2e8f0; margin: 16px 0; }
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 Panel Admin</h1>
    <p>Acceso restringido · Tiempo Barcelona</p>
    <input type="password" id="pwd-input" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-primary" id="btn-login">Entrar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- ══ EDITOR ══ -->
<div id="editor-screen">

  <div class="editor-header">
    <h1>✏️ Editor de Artículo</h1>
    <div class="badge-live">Publicación en directo</div>
  </div>

  <!-- Bloque 1 (principal, no eliminable) -->
  <div class="card" id="bloque-0">
    <label>📅 Fecha / Cabecera</label>
    <input type="text" id="b0-fecha" placeholder="Ej: LUNES 18 DE MAYO">

    <label style="margin-top:14px;">📰 Titular</label>
    <input type="text" id="b0-titular" placeholder="Ej: NO OLVIDÉIS EL PARAGUAS">

    <label style="margin-top:14px;">🖼️ URL de imagen (opcional)</label>
    <input type="text" id="b0-imagen" placeholder="Ej: titular.jpg o https://…">

    <label style="margin-top:14px;">📝 Subtítulo</label>
    <input type="text" id="b0-subtitulo" placeholder="Ej: Riesgo de lluvia y tormenta entre las 11 y 15 horas.">

    <label style="margin-top:14px;">📄 Cuerpo del artículo</label>
    <textarea id="b0-cuerpo" placeholder="Escribe aquí el contenido principal…"></textarea>
  </div>

  <!-- Bloques extra (se añaden dinámicamente) -->
  <div id="bloques-extra"></div>

  <button class="btn-add-bloque" id="btn-add-bloque">＋ Añadir bloque adicional</button>

  <!-- Preview -->
  <div class="card preview-card" style="margin-top: 24px;">
    <div class="preview-label">👁 Vista previa</div>
    <div id="preview-content"></div>
  </div>

  <!-- Acciones -->
  <div class="actions" style="margin-top: 24px;">
    <button class="btn-save" id="btn-save">💾 Publicar ahora</button>
    <button class="btn-logout" id="btn-logout">Salir</button>
  </div>
  <div class="status-msg" id="status-msg"></div>

</div>

<!-- ── Firebase compat (NO usa ES modules, funciona abriendo el archivo directamente) ── -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  // ── Configuración Firebase ──
  firebase.initializeApp({
    apiKey: "AIzaSyCACCy2SA-1JDH3DO1WyjDRPcqG7or5ZmY",
    authDomain: "tiempo-barcelona.firebaseapp.com",
    projectId: "tiempo-barcelona",
    storageBucket: "tiempo-barcelona.firebasestorage.app",
    messagingSenderId: "1001480227705",
    appId: "1:1001480227705:web:d2158e16f4993f522efda8"
  });
  const db = firebase.firestore();

  // ── Contraseña ──
  const PASSWORD = "bcn2025";

  // ── Estado ──
  let bloqueCount = 0;

  // ── Helpers ──
  function getVal(id) { var el = document.getElementById(id); return el ? el.value : ''; }
  function setVal(id, v) { var el = document.getElementById(id); if(el) el.value = v; }
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── LOGIN ──
  function doLogin() {
    var val = document.getElementById('pwd-input').value;
    if (val === PASSWORD) {
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('editor-screen').style.display = 'block';
      cargarArticulo();
      setupPreview();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function logout() {
    document.getElementById('editor-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pwd-input').value = '';
  }

  // ── CARGAR artículo guardado ──
  function cargarArticulo() {
    db.collection('articulo').doc('principal').get().then(function(snap) {
      if (!snap.exists) return;
      var d = snap.data();
      setVal('b0-fecha',     d.fecha     || '');
      setVal('b0-titular',   d.titular   || '');
      setVal('b0-imagen',    d.imagen    || '');
      setVal('b0-subtitulo', d.subtitulo || '');
      setVal('b0-cuerpo',    d.cuerpo    || '');
      if (d.bloques && Array.isArray(d.bloques)) {
        d.bloques.forEach(function(b) { addBloque(b); });
      }
      actualizarPreview();
    }).catch(function(e) {
      console.warn('No se pudo cargar el artículo:', e);
    });
  }

  // ── GUARDAR ──
  function guardar() {
    var btn = document.getElementById('btn-save');
    var msg = document.getElementById('status-msg');
    btn.disabled = true;
    msg.className = 'status-msg status-loading';
    msg.textContent = 'Publicando…';

    var data = recogerDatos();
    data.updatedAt = new Date().toISOString();

    db.collection('articulo').doc('principal').set(data).then(function() {
      msg.className = 'status-msg status-ok';
      msg.textContent = '✓ Publicado correctamente · ' + new Date().toLocaleTimeString('es-ES');
      btn.disabled = false;
    }).catch(function(e) {
      msg.className = 'status-msg status-err';
      msg.textContent = '✗ Error al publicar: ' + e.message;
      btn.disabled = false;
    });
  }

  function recogerDatos() {
    var bloques = [];
    document.querySelectorAll('.bloque-extra').forEach(function(el) {
      var id = el.dataset.id;
      bloques.push({
        titular:   getVal('bx-titular-'   + id),
        imagen:    getVal('bx-imagen-'    + id),
        subtitulo: getVal('bx-subtitulo-' + id),
        cuerpo:    getVal('bx-cuerpo-'    + id),
      });
    });
    return {
      fecha:     getVal('b0-fecha'),
      titular:   getVal('b0-titular'),
      imagen:    getVal('b0-imagen'),
      subtitulo: getVal('b0-subtitulo'),
      cuerpo:    getVal('b0-cuerpo'),
      bloques:   bloques
    };
  }

  // ── BLOQUES EXTRA ──
  function addBloque(datos) {
    datos = datos || {};
    bloqueCount++;
    var id = bloqueCount;
    var wrapper = document.getElementById('bloques-extra');
    var div = document.createElement('div');
    div.className = 'card bloque-extra';
    div.dataset.id = id;
    div.innerHTML =
      '<button class="btn-remove btn-remove-bloque" title="Eliminar bloque">✕</button>' +
      '<label>📰 Titular (bloque ' + id + ')</label>' +
      '<input type="text" id="bx-titular-' + id + '" placeholder="Titular del bloque…" value="' + esc(datos.titular||'') + '">' +
      '<label style="margin-top:12px;">🖼️ URL de imagen (opcional)</label>' +
      '<input type="text" id="bx-imagen-' + id + '" placeholder="Ej: tendencia.jpg" value="' + esc(datos.imagen||'') + '">' +
      '<label style="margin-top:12px;">📝 Subtítulo</label>' +
      '<input type="text" id="bx-subtitulo-' + id + '" placeholder="Subtítulo del bloque…" value="' + esc(datos.subtitulo||'') + '">' +
      '<label style="margin-top:12px;">📄 Cuerpo</label>' +
      '<textarea id="bx-cuerpo-' + id + '" placeholder="Texto del bloque…">' + esc(datos.cuerpo||'') + '</textarea>';

    wrapper.appendChild(div);

    div.querySelector('.btn-remove-bloque').addEventListener('click', function() {
      div.remove();
      actualizarPreview();
    });
    div.querySelectorAll('input, textarea').forEach(function(el) {
      el.addEventListener('input', actualizarPreview);
    });
    actualizarPreview();
  }

  // ── PREVIEW ──
  function setupPreview() {
    ['b0-fecha','b0-titular','b0-imagen','b0-subtitulo','b0-cuerpo'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', actualizarPreview);
    });
  }

  function actualizarPreview() {
    var d = recogerDatos();
    var html = renderBloque(d, false);
    d.bloques.forEach(function(b) { html += '<hr class="p-separador">' + renderBloque(b, true); });
    document.getElementById('preview-content').innerHTML = html;
  }

  function renderBloque(b, extra) {
    var h = '';
    if (!extra && b.fecha)   h += '<div class="p-fecha">' + esc(b.fecha) + '</div>';
    if (b.titular)           h += '<div class="p-titular">' + esc(b.titular) + '</div>';
    if (b.imagen)            h += '<img class="p-imagen" src="' + esc(b.imagen) + '" onerror="this.style.display=\'none\'">';
    if (b.subtitulo)         h += '<div class="p-subtitulo">' + esc(b.subtitulo) + '</div>';
    if (b.cuerpo)            h += '<div class="p-cuerpo">' + esc(b.cuerpo) + '</div>';
    return h;
  }

  // ── Vincular eventos ──
  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('pwd-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  document.getElementById('btn-logout').addEventListener('click', logout);
  document.getElementById('btn-save').addEventListener('click', guardar);
  document.getElementById('btn-add-bloque').addEventListener('click', function() { addBloque(); });
</script>
</body>
</html>
